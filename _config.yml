# Remote theme directory
remote_theme: analytics-link/analytics-link.github.io

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-remote-theme

#-------------------------------
# General Site Settings
title: Kunal Patel
description: "Hi I'm Kunal Patel, and I'm an an aspiring Software Developer passionate about turning innovative ideas into real-world applications. My portfolio showcases projects that highlight my technical skills and business acumen. Please visit my Github & LinkedIn pages (or download my Resume) by using the links below!"
baseurl: "" # the subpath of your site, e.g. /blog
url: "" # the base hostname & protocol for your site, e.g. http://example.com

#-------------------------------
# About Section
subtitle: Software Developer <span style="color:#f58506"> Portfolio </span>
location: "Melbourne, Australia"
resume_url: /docs/Kunal_Patel_Resume.docx 
avatar_image: /img/IMG_6598 2.JPG

#-------------------------------
# Contact links
linkedln: "https://linkedin.com/in/kunallpatel" # Add your linkedln handle
github: "https://github.com/KunalPatel97"  # Add your github handle

paginate: 6
paginate_path: "/page/:num"

sass:
  sass_dir: _sass
  style: compressed # possible values: nested expanded compact compressed

defaults:
  - scope:
      type: posts
    values:
      layout: post
      read_time: true
      share: false


